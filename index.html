<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>MNNIT Hostel Allotment Portal</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Header -->

    <header class="header">

        <img class="logo"
            src="https://lh3.googleusercontent.com/d/1uLcGZj-m_R4fj0hGs8u-WDtsU4NRDNap"
            alt="MNNIT Logo">

        <div class="title">

            <h1>Hostel Allotment Portal</h1>

            <p>Chief Warden Office</p>

            <p>Motilal Nehru National Institute of Technology Allahabad</p>

        </div>

    </header>


    <!-- Main Section -->

    <main class="main-container">

        <div class="search-box">

            <h2>Check Hostel Allotment</h2>

            <div class="form-group">

                <label for="gender">Gender</label>

                <select id="gender">

                    <option value="" selected disabled>Select Gender</option>

                    <option value="boys">Boys</option>

                    <option value="girls">Girls</option>

                </select>

            </div>

            <div class="form-group">

                <label for="year">Year</label>

                <select id="year">

                    <option value="" selected disabled>Select Year</option>

                    <option value="second_year">Second Year</option>

                    <option value="third_year">Third Year</option>

                    <option value="final_year">Final Year</option>

                    <option value="pg">Post Graduation</option>

                </select>

            </div>

            <div class="form-group">

                <label for="regNo">

                    Registration Number

                </label>

                <input
                    type="text"
                    id="regNo"
                    placeholder="Enter Registration Number"
                    disabled>

            </div>

            <button onclick="verifyCertificate()">

                Check Allotment

            </button>

        </div>


        <!-- Result -->

        <div id="result"></div>

    </main>


    <!-- Footer -->

    <footer>

        © 2026 Chief Warden Office |
        Motilal Nehru National Institute of Technology Allahabad

    </footer>

    <script src="main.js"></script>

</body>

</html>
