<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MNNIT Certificate Verification Portal</title>


<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Header -->
<div class="header">

<img class="logo" src="https://lh3.googleusercontent.com/d/1uLcGZj-m_R4fj0hGs8u-WDtsU4NRDNap">

<div class="title">
<h1>Certificate Verification Portal</h1>
<p>Event Organized By ( Dean Student & Faculty ) Welfare</p>
<p>Motilal Nehru National Institute of Technology Allahabad</p>
</div>

</div>

<!-- Search -->
<div class="search-box">

<h2>Verify Your Certificate</h2> 

<!-- Select the Event  -->
<select id="eventSelect">
    <option value="">Select Event</option>

    <option value="mhwb">
        Mental Health & Well-Being (MHWB 2026)
    </option>

    <option value="pewp">
        Pedagogical Excellence & Wellness Program (PEWP 2026)
    </option>

    <option value="reccb">
        Research Excellence & Campus Culture Building (RECCB 2026)
    </option>
</select>

<input
    type="text"
    id="certNo"
    placeholder="Enter Certificate Number"
    disabled>

<button onclick="verifyCertificate()">
    Verify
</button>

</div>

<div id="result"></div>

<div class="footer">
© 2026 Dean (Student Welfare) Office | MNNIT Allahabad
</div>

<script src="mhwb.js"></script>
<script src="pewp.js"></script>
<script src="reccb.js"></script>
<script src="main.js"></script>


</body>
</html>
