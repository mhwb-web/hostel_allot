<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 500px;
            width: 90%;
        }

        h1 {
            color: #0d6efd;
            margin-bottom: 15px;
        }

        p {
            color: #555;
            line-height: 1.6;
            margin: 10px 0;
        }

        .icon {
            font-size: 60px;
            margin-bottom: 20px;
        }

        .footer {
            margin-top: 25px;
            font-size: 14px;
            color: #888;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon">🛠️</div>

    <h1>Website Under Maintenance</h1>

    <p>
        The <strong>Certificate Verification Portal</strong> is temporarily unavailable due to scheduled maintenance.
    </p>

    <p>
        We are working to improve the service and will be back shortly.
    </p>

    <div class="footer">
        Thank you for your patience.
    </div>
</div>

</body>
</html>
