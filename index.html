 <!--Header Modified --> 
 <div class="header" id="header">

        <h1>Certificate Verification Portal</h1>

        <p id="eventTitle">

        <p id="eventSubTitle">
            Select an Event
        </p>

    <!-- Dynamic Event Logo -->

        id="eventLogo"
        class="logo"
        src=""
        style="display:none">

</div>

<!-- Search -->
<div class="search-box">

<h2>Verify Your Certificate</h2> 


<select id="eventSelect">
    <option value="">Select Event</option>

    <option value="mhwb">
        Mental Health & Well-Being (MHWB 2026)
    </option>

    <option value="pewp">
        Pedagogical Excellence & Wellness Program (PEWP 2026)
    </option>

    <option value="reccb">
        Research Excellence & Campus Culture Building (RECCB 2026)
    </option>
</select>

<input
    type="text"
    id="certNo"
    placeholder="Enter Certificate Number"
    disabled>

<button onclick="verifyCertificate()">
    Verify
</button>

<div id="result"></div>
